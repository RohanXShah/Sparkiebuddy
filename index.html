<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sparkie Buddy – AI ADHD Companion</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --yellow: #FFD600;
      --yellow-dim: rgba(255, 214, 0, 0.15);
      --yellow-glow: rgba(255, 214, 0, 0.35);
      --blue: #2979FF;
      --blue-light: #82B1FF;
      --teal: #00E5FF;
      --white: #FFFFFF;
      --navy: #040D2A;
      --navy-mid: #0A1A50;
      --navy-light: #122268;
      --text-muted: rgba(200, 220, 255, 0.65);
      --text-bright: rgba(220, 235, 255, 0.92);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--navy);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      color: var(--white);
    }

    /* ── CANVAS LAYER ── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── SCENE ── */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      z-index: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(40px, 6vw, 100px) clamp(28px, 4vw, 72px) clamp(40px, 6vw, 100px) clamp(40px, 7vw, 120px);
      z-index: 10;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 10;
    }

    /* ── DIVIDER GLOW ── */
    .divider {
      position: absolute;
      top: 8%;
      bottom: 8%;
      left: 50%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(41, 121, 255, 0.3) 25%, rgba(255, 214, 0, 0.5) 50%, rgba(41, 121, 255, 0.3) 75%, transparent);
      z-index: 5;
      transform: translateX(-50%);
    }

    .divider::after {
      content: '';
      position: absolute;
      left: -3px;
      top: 0;
      bottom: 0;
      width: 7px;
      background: inherit;
      filter: blur(6px);
      opacity: 0.6;
    }

    /* ── TOP NAV ── */
    .topnav {
      position: absolute;
      top: clamp(16px, 2.5vh, 32px);
      left: clamp(16px, 2.5vw, 40px);
      right: clamp(16px, 2.5vw, 40px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 30;
      animation: fadeDown 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: clamp(32px, 3.5vw, 46px);
      height: clamp(32px, 3.5vw, 46px);
      background: var(--navy-light);
      border: 1.5px solid rgba(255, 214, 0, 0.5);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 1.8vw, 22px);
      box-shadow: 0 0 20px rgba(255, 214, 0, 0.2);
      position: relative;
      overflow: visible;
    }

    .logo-icon::after {
      content: '';
      position: absolute;
      top: -1px;
      right: -1px;
      width: 8px;
      height: 8px;
      background: var(--yellow);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--yellow);
      animation: blink 2s ease-in-out infinite alternate;
    }

    .logo-words {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-words .top {
      font-family: 'Syne', sans-serif;
      font-size: clamp(11px, 1.1vw, 15px);
      color: var(--white);
      letter-spacing: 0.04em;
    }

    .logo-words .bot {
      font-family: 'Syne', sans-serif;
      font-size: clamp(11px, 1.1vw, 15px);
      color: var(--yellow);
      letter-spacing: 0.04em;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: clamp(9px, 0.75vw, 12px);
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }

    .nav-dot {
      width: 6px;
      height: 6px;
      background: #00E676;
      border-radius: 50%;
      box-shadow: 0 0 8px #00E676;
      animation: blink 1.6s ease-in-out infinite alternate;
    }

    /* ── LEFT CONTENT ── */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(255, 214, 0, 0.12), rgba(255, 214, 0, 0.06));
      border: 1px solid rgba(255, 214, 0, 0.3);
      border-radius: 100px;
      padding: 5px 16px 5px 10px;
      font-size: clamp(9px, 0.7vw, 11px);
      font-weight: 600;
      color: var(--yellow);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: clamp(16px, 2.5vh, 28px);
      width: fit-content;
      animation: fadeUp 0.6s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .eyebrow-icon {
      width: 20px;
      height: 20px;
      background: rgba(255, 214, 0, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .headline {
      margin-bottom: clamp(6px, 1vh, 14px);
      animation: fadeUp 0.6s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .headline-line1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 5.5vw, 78px);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 0.95;
      display: block;
    }

    .headline-line2 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 5.5vw, 78px);
      font-weight: 800;
      background: linear-gradient(90deg, #FFD600, #FF8C00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      line-height: 0.95;
      display: block;
      text-shadow: none;
    }

    .sub-tag {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(9px, 0.65vw, 11px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blue-light);
      margin-bottom: clamp(10px, 1.8vh, 22px);
      animation: fadeUp 0.6s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .desc {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: clamp(18px, 3vh, 36px);
      animation: fadeUp 0.6s 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ── FEATURE CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(5px, 0.6vw, 9px);
      margin-bottom: clamp(22px, 3.5vh, 44px);
      animation: fadeUp 0.6s 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      padding: clamp(4px, 0.5vh, 7px) clamp(10px, 1vw, 16px);
      font-size: clamp(9px, 0.72vw, 12px);
      font-weight: 600;
      color: var(--text-bright);
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      cursor: default;
    }

    .chip:hover {
      border-color: rgba(255, 214, 0, 0.35);
      background: rgba(255, 214, 0, 0.07);
      transform: translateY(-2px);
    }

    .chip-icon {
      font-size: clamp(11px, 1vw, 15px);
    }

    /* ── CTA ── */
    .cta-row {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.2vw, 18px);
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .btn-primary {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #FFD600, #FF8C00);
      color: #040D2A;
      border: none;
      border-radius: 14px;
      padding: clamp(10px, 1.4vh, 16px) clamp(18px, 2.2vw, 32px);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      text-decoration: none;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(255, 214, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 14px 40px rgba(255, 214, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-arrow {
      font-size: 1.1em;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: clamp(11px, 0.85vw, 14px);
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }

    .btn-ghost:hover {
      color: var(--white);
    }

    .play-ring {
      width: clamp(28px, 2.8vw, 38px);
      height: clamp(28px, 2.8vw, 38px);
      background: rgba(255, 255, 255, 0.07);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      padding-left: 2px;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-ghost:hover .play-ring {
      border-color: rgba(255, 214, 0, 0.4);
      background: rgba(255, 214, 0, 0.08);
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: flex;
      gap: clamp(16px, 2vw, 32px);
      margin-top: clamp(20px, 3.5vh, 48px);
      padding-top: clamp(16px, 2.5vh, 28px);
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      animation: fadeUp 0.6s 0.88s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(18px, 2.2vw, 30px);
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-num span {
      color: var(--yellow);
    }

    .stat-label {
      font-size: clamp(8px, 0.65vw, 11px);
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ══════════════════════════════
       ROBOT — RIGHT PANEL
    ══════════════════════════════ */
    .robot-world {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Orbit rings */
    .orbit {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      animation: spinOrbit linear infinite;
      pointer-events: none;
    }

    .orbit-1 {
      width: clamp(220px, 28vw, 380px);
      height: clamp(220px, 28vw, 380px);
      border-color: rgba(41, 121, 255, 0.15);
      animation-duration: 20s;
    }

    .orbit-2 {
      width: clamp(300px, 38vw, 520px);
      height: clamp(300px, 38vw, 520px);
      border-color: rgba(255, 214, 0, 0.08);
      animation-duration: 35s;
      animation-direction: reverse;
    }

    .orbit-3 {
      width: clamp(370px, 48vw, 640px);
      height: clamp(370px, 48vw, 640px);
      border-color: rgba(0, 229, 255, 0.06);
      animation-duration: 55s;
    }

    @keyframes spinOrbit {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Orbit dots */
    .orbit-dot {
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .orbit-1 .orbit-dot {
      background: var(--blue);
      box-shadow: 0 0 12px var(--blue);
    }

    .orbit-2 .orbit-dot {
      background: var(--yellow);
      box-shadow: 0 0 12px var(--yellow);
      width: 6px;
      height: 6px;
    }

    .orbit-3 .orbit-dot {
      background: var(--teal);
      box-shadow: 0 0 10px var(--teal);
      width: 5px;
      height: 5px;
    }

    /* Floating mini-bot faces */
    .mini-bots {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .mbot {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-radius: 14px;
      padding: 7px 9px;
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      animation: mbotFloat ease-in-out infinite alternate;
    }

    .mbot-visor {
      border-radius: 5px;
      background: #060F30;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-bottom: 3px;
    }

    .mbot-eye {
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 0 0 6px rgba(255, 214, 0, 0.7);
      animation: eyeBlink 3.5s ease-in-out infinite;
    }

    .mbot-mouth {
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      border-top: none;
      border-radius: 0 0 8px 8px;
    }

    .mbot-antenna {
      width: 1.5px;
      height: 10px;
      background: rgba(255, 255, 255, 0.4);
      margin-bottom: 2px;
      border-radius: 1px;
      position: relative;
    }

    .mbot-antenna::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -3px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite alternate;
    }

    /* individual mini-bots */
    .mb1 {
      width: clamp(54px, 6vw, 76px);
      top: 9%;
      left: 4%;
      animation-duration: 7s;
      animation-delay: 0s;
      background: rgba(231, 76, 107, 0.15);
    }

    .mb1 .mbot-antenna::after {
      background: #E74C6B;
      box-shadow: 0 0 8px #E74C6B;
    }

    .mb2 {
      width: clamp(48px, 5.5vw, 70px);
      top: 30%;
      left: 12%;
      animation-duration: 9s;
      animation-delay: 0.5s;
      background: rgba(39, 174, 96, 0.15);
    }

    .mb2 .mbot-antenna::after {
      background: #27AE60;
      box-shadow: 0 0 8px #27AE60;
    }

    .mb3 {
      width: clamp(58px, 6.5vw, 82px);
      top: 58%;
      left: 5%;
      animation-duration: 8s;
      animation-delay: 1s;
      background: rgba(155, 89, 182, 0.15);
    }

    .mb3 .mbot-antenna::after {
      background: #9B59B6;
      box-shadow: 0 0 8px #9B59B6;
    }

    .mb4 {
      width: clamp(50px, 5.8vw, 72px);
      top: 7%;
      left: 62%;
      animation-duration: 10s;
      animation-delay: 1.5s;
      background: rgba(41, 121, 255, 0.15);
    }

    .mb4 .mbot-antenna::after {
      background: var(--blue);
      box-shadow: 0 0 8px var(--blue);
    }

    .mb5 {
      width: clamp(48px, 5.5vw, 68px);
      top: 26%;
      left: 76%;
      animation-duration: 7.5s;
      animation-delay: 0.3s;
      background: rgba(0, 229, 255, 0.12);
    }

    .mb5 .mbot-antenna::after {
      background: var(--teal);
      box-shadow: 0 0 8px var(--teal);
    }

    .mb6 {
      width: clamp(46px, 5vw, 64px);
      top: 64%;
      left: 68%;
      animation-duration: 11s;
      animation-delay: 2s;
      background: rgba(255, 152, 0, 0.15);
    }

    .mb6 .mbot-antenna::after {
      background: #FF9800;
      box-shadow: 0 0 8px #FF9800;
    }

    .mb7 {
      width: clamp(52px, 5.8vw, 74px);
      top: 80%;
      left: 18%;
      animation-duration: 8.5s;
      animation-delay: 0.8s;
      background: rgba(233, 30, 140, 0.12);
    }

    .mb7 .mbot-antenna::after {
      background: #E91E8C;
      box-shadow: 0 0 8px #E91E8C;
    }

    .mb8 {
      width: clamp(46px, 5vw, 64px);
      top: 76%;
      left: 52%;
      animation-duration: 9.5s;
      animation-delay: 1.8s;
      background: rgba(0, 150, 136, 0.15);
    }

    .mb8 .mbot-antenna::after {
      background: #009688;
      box-shadow: 0 0 8px #009688;
    }

    @keyframes mbotFloat {
      from {
        transform: translateY(0) rotate(-1.5deg);
      }

      to {
        transform: translateY(-14px) rotate(1.5deg);
      }
    }

    /* ── MAIN ROBOT ── */
    .robot-stage {
      position: relative;
      z-index: 20;
      animation: mainBob 3.8s ease-in-out infinite;
    }

    @keyframes mainBob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-14px);
      }
    }

    .main-robot {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: scale(clamp(0.5, 0.55 + 3vw / 100, 1.1));
      transform-origin: center center;
      filter: drop-shadow(0 30px 60px rgba(41, 121, 255, 0.3));
    }

    /* Halo glow */
    .halo {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 214, 0, 0.18) 0%, rgba(41, 121, 255, 0.08) 50%, transparent 75%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: haloBreath 3s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes haloBreath {
      from {
        transform: translate(-50%, -50%) scale(0.85);
        opacity: 0.6;
      }

      to {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 1;
      }
    }

    /* Antenna */
    .mr-antenna {
      width: 4px;
      height: 28px;
      background: linear-gradient(to top, var(--blue-light), var(--yellow));
      border-radius: 3px;
      margin-bottom: -2px;
      position: relative;
    }

    .mr-antenna::after {
      content: '';
      width: 12px;
      height: 12px;
      background: var(--yellow);
      border-radius: 50%;
      position: absolute;
      top: -7px;
      left: -4px;
      box-shadow: 0 0 16px var(--yellow), 0 0 32px rgba(255, 214, 0, 0.5);
      animation: blink 1.4s ease-in-out infinite alternate;
    }

    /* Head */
    .mr-head {
      width: 118px;
      height: 96px;
      background: linear-gradient(160deg, #C5E8FF 0%, #8DD4F8 55%, #5BB8EE 100%);
      border-radius: 24px;
      border: 3px solid rgba(255, 255, 255, 0.55);
      position: relative;
      box-shadow: 0 10px 35px rgba(33, 150, 243, 0.45), inset 0 3px 8px rgba(255, 255, 255, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .mr-head::before {
      content: '';
      position: absolute;
      top: 7px;
      left: 12px;
      right: 12px;
      height: 16px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.7), transparent);
      border-radius: 10px;
    }

    /* Headphones */
    .mr-phones {
      position: absolute;
      top: 10px;
      left: -7px;
      right: -7px;
      height: 22px;
      border: 4.5px solid #FFAB40;
      border-bottom: none;
      border-radius: 22px 22px 0 0;
    }

    .mr-phones::before,
    .mr-phones::after {
      content: '';
      position: absolute;
      bottom: -7px;
      width: 15px;
      height: 15px;
      background: #FFAB40;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255, 171, 64, 0.7);
    }

    .mr-phones::before {
      left: -7px;
    }

    .mr-phones::after {
      right: -7px;
    }

    /* Visor */
    .mr-visor {
      width: 78px;
      height: 48px;
      background: #060F30;
      border-radius: 15px;
      border: 2.5px solid rgba(100, 181, 246, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: inset 0 0 16px rgba(33, 150, 243, 0.45), 0 0 12px rgba(33, 150, 243, 0.3);
      margin-top: 8px;
    }

    .mr-eye {
      width: 19px;
      height: 19px;
      background: radial-gradient(circle at 35% 35%, #FFD600, #F9A825);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255, 214, 0, 0.85);
      animation: eyeBlink 4s ease-in-out infinite;
      position: relative;
    }

    .mr-eye::after {
      content: '';
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 3px;
      opacity: 0.75;
    }

    .mr-eye:last-child {
      animation-delay: 0.4s;
    }

    .mr-smile {
      position: absolute;
      bottom: 13px;
      width: 32px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-top: none;
      border-radius: 0 0 16px 16px;
    }

    /* Neck */
    .mr-neck {
      width: 22px;
      height: 9px;
      background: #90CAF9;
      border-radius: 5px;
    }

    /* Body + arms wrapper */
    .body-arms {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .mr-arm {
      width: 25px;
      height: 75px;
      background: linear-gradient(to bottom, #AADCFF, #70BFEE);
      border-radius: 13px;
      border: 3px solid rgba(255, 255, 255, 0.45);
      margin-top: 8px;
    }

    .mr-arm.left {
      transform: rotate(12deg);
      margin-right: -2px;
    }

    .mr-arm.right {
      transform: rotate(-12deg);
      margin-left: -2px;
      position: relative;
    }

    /* Wand on right arm */
    .mr-wand {
      position: absolute;
      right: -30px;
      bottom: -6px;
      width: 30px;
      height: 6px;
      background: linear-gradient(90deg, #FFD600, #fff);
      border-radius: 4px;
      transform: rotate(-38deg);
    }

    .mr-wand::after {
      content: '✦';
      position: absolute;
      right: -10px;
      top: -12px;
      font-size: 18px;
      color: var(--yellow);
      filter: drop-shadow(0 0 8px var(--yellow));
      animation: blink 1.2s ease-in-out infinite alternate;
    }

    .mr-body {
      width: 126px;
      height: 106px;
      background: linear-gradient(160deg, #CEEAFF 0%, #96D0FA 100%);
      border-radius: 22px;
      border: 3px solid rgba(255, 255, 255, 0.42);
      box-shadow: 0 14px 36px rgba(33, 150, 243, 0.28), inset 0 2px 8px rgba(255, 255, 255, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 7px;
      position: relative;
    }

    .mr-body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1.5px;
      height: 100%;
      background: rgba(255, 255, 255, 0.38);
    }

    .mr-body::after {
      content: '🩺';
      position: absolute;
      top: 13px;
      left: 17px;
      font-size: 15px;
    }

    .mr-chest {
      width: 65px;
      height: 40px;
      background: #060F30;
      border-radius: 11px;
      border: 2.5px solid #64B5F6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 16px rgba(33, 150, 243, 0.55), inset 0 0 10px rgba(33, 150, 243, 0.25);
      animation: chestGlow 2.2s ease-in-out infinite alternate;
    }

    @keyframes chestGlow {
      from {
        box-shadow: 0 0 10px rgba(33, 150, 243, 0.45);
      }

      to {
        box-shadow: 0 0 28px rgba(33, 150, 243, 0.8), 0 0 50px rgba(255, 214, 0, 0.18);
      }
    }

    .mr-badge {
      width: 13px;
      height: 13px;
      background: var(--yellow);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255, 214, 0, 0.8);
      animation: blink 2s ease-in-out infinite alternate;
    }

    /* Legs */
    .mr-legs {
      display: flex;
      gap: 15px;
      margin-top: 4px;
    }

    .mr-leg {
      width: 30px;
      height: 52px;
      background: linear-gradient(to bottom, #AADCFF, #70BFEE);
      border-radius: 13px 13px 17px 17px;
      border: 3px solid rgba(255, 255, 255, 0.42);
    }

    /* Tooltip bubble */
    .robot-bubble {
      position: absolute;
      top: -20px;
      right: -110px;
      background: rgba(10, 26, 80, 0.85);
      border: 1px solid rgba(255, 214, 0, 0.35);
      border-radius: 14px 14px 14px 4px;
      padding: 8px 14px;
      font-size: clamp(10px, 0.8vw, 13px);
      font-weight: 600;
      color: var(--yellow);
      white-space: nowrap;
      backdrop-filter: blur(12px);
      animation: bubbleFloat 4s ease-in-out infinite;
    }

    .robot-bubble::before {
      content: '👋 ';
    }

    @keyframes bubbleFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue), var(--yellow), var(--blue), var(--teal));
      background-size: 300% 100%;
      animation: barShimmer 4s linear infinite;
      border-radius: 0 2px 0 0;
      z-index: 50;
    }

    @keyframes barShimmer {
      from {
        background-position: 0% 0%;
        width: 30%;
      }

      to {
        background-position: 300% 0%;
        width: 88%;
      }
    }

    /* ── VIGNETTE ── */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(4, 13, 42, 0.6) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── ANIMATIONS ── */
    @keyframes eyeBlink {

      0%,
      82%,
      100% {
        transform: scaleY(1);
      }

      87% {
        transform: scaleY(0.06);
      }
    }

    @keyframes blink {
      from {
        opacity: 0.4;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── PAGE TRANSITION ── */
    .page-transition {
      position: fixed;
      inset: 0;
      background: var(--navy);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ══════════════════
      RESPONSIVE
    ══════════════════ */
    @media (max-width: 900px) {

      html,
      body {
        overflow: auto;
      }

      .scene {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: 100vh;
      }

      .left-panel {
        padding: clamp(90px, 14vh, 120px) clamp(22px, 5vw, 48px) clamp(28px, 4vh, 44px);
        align-items: center;
        text-align: center;
      }

      .desc {
        max-width: 520px;
      }

      .chips {
        justify-content: center;
      }

      .cta-row {
        justify-content: center;
      }

      .stats-row {
        justify-content: center;
      }

      .right-panel {
        min-height: 50vw;
      }

      .divider {
        display: none;
      }

      .mb3,
      .mb7,
      .mb8 {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .left-panel {
        padding-top: clamp(70px, 10vh, 96px);
      }

      .right-panel {
        min-height: 55vw;
      }

      .headline-line1,
      .headline-line2 {
        font-size: clamp(32px, 10vw, 52px);
      }

      .mb2,
      .mb5,
      .mb6 {
        display: none;
      }

      .robot-bubble {
        display: none;
      }

      .stats-row {
        gap: 20px;
      }
    }

    @media (max-width: 400px) {

      .headline-line1,
      .headline-line2 {
        font-size: 28px;
      }

      .main-robot {
        transform: scale(0.48);
      }
    }

    @media (min-width: 1600px) {
      .main-robot {
        transform: scale(1.15);
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {

      html,
      body {
        overflow: auto;
      }

      .scene {
        grid-template-columns: 1fr 1fr;
        height: auto;
        min-height: 100vh;
      }

      .left-panel {
        padding-top: clamp(60px, 9vh, 80px);
      }

      .desc {
        display: none;
      }

      .main-robot {
        transform: scale(0.5);
      }
    }
  </style>
</head>

<body>

  <div class="page-transition" id="pageTransition"></div>
  <canvas id="bgCanvas"></canvas>
  <div class="vignette"></div>

  <div class="scene">

    <!-- TOP NAV -->
    <div class="topnav">
      <div class="nav-pill" style="margin-left:auto;">
        <div class="nav-dot"></div>
        AI ADHD Companion
      </div>
    </div>

    <!-- LEFT PANEL -->
    <div class="left-panel">

      <div class="headline">
        <span class="headline-line1">SPARKIE</span>
        <span class="headline-line2">BUDDY</span>
      </div>

      <div class="sub-tag">Your Smart ADHD Helper</div>

      <p class="desc">
        A friendly AI companion built for kids &amp; people with ADHD — delivering personalized games, calming ASMR,
        focus exercises, and so much more. Learning made joyful.
      </p>

      <div class="cta-row">
        <a href="home.html" class="btn-primary" id="enterBtn">
          Start Now <span class="btn-arrow">→</span>
        </a>
        <a href="about.html" class="btn-ghost">
          <div class="play-ring">▶</div>
          Learn More
        </a>
      </div>

    </div>

    <!-- DIVIDER -->
    <div class="divider"></div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="robot-world">

        <!-- Orbit rings -->
        <div class="orbit orbit-1">
          <div class="orbit-dot"></div>
        </div>
        <div class="orbit orbit-2">
          <div class="orbit-dot"></div>
        </div>
        <div class="orbit orbit-3">
          <div class="orbit-dot"></div>
        </div>

        <!-- Mini bots -->
        <div class="mini-bots">

          <div class="mbot mb1">
            <div class="mbot-antenna" style="height:10px;"></div>
            <div class="mbot-visor" style="width:36px;height:24px;gap:5px;">
              <div class="mbot-eye" style="width:7px;height:7px;"></div>
              <div class="mbot-eye" style="width:7px;height:7px;animation-delay:.3s;"></div>
            </div>
            <div class="mbot-mouth" style="width:16px;height:6px;"></div>
          </div>

          <div class="mbot mb2">
            <div class="mbot-antenna" style="height:9px;"></div>
            <div class="mbot-visor" style="width:32px;height:22px;gap:4px;">
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:.5s;"></div>
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:.8s;"></div>
            </div>
            <div class="mbot-mouth" style="width:14px;height:5px;"></div>
          </div>

          <div class="mbot mb3">
            <div class="mbot-antenna" style="height:12px;"></div>
            <div class="mbot-visor" style="width:40px;height:27px;gap:6px;">
              <div class="mbot-eye" style="width:8px;height:8px;animation-delay:.7s;"></div>
              <div class="mbot-eye" style="width:8px;height:8px;animation-delay:1.1s;"></div>
            </div>
            <div class="mbot-mouth" style="width:18px;height:7px;"></div>
          </div>

          <div class="mbot mb4">
            <div class="mbot-antenna" style="height:9px;"></div>
            <div class="mbot-visor" style="width:32px;height:22px;gap:4px;">
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:.2s;"></div>
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:1.4s;"></div>
            </div>
            <div class="mbot-mouth" style="width:14px;height:5px;"></div>
          </div>

          <div class="mbot mb5">
            <div class="mbot-antenna" style="height:8px;"></div>
            <div class="mbot-visor" style="width:30px;height:20px;gap:4px;">
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:1s;"></div>
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:.4s;"></div>
            </div>
            <div class="mbot-mouth" style="width:12px;height:5px;"></div>
          </div>

          <div class="mbot mb6">
            <div class="mbot-antenna" style="height:9px;"></div>
            <div class="mbot-visor" style="width:32px;height:22px;gap:4px;">
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:.6s;"></div>
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:1.8s;"></div>
            </div>
            <div class="mbot-mouth" style="width:14px;height:5px;"></div>
          </div>

          <div class="mbot mb7">
            <div class="mbot-antenna" style="height:10px;"></div>
            <div class="mbot-visor" style="width:35px;height:23px;gap:5px;">
              <div class="mbot-eye" style="width:7px;height:7px;animation-delay:2s;"></div>
              <div class="mbot-eye" style="width:7px;height:7px;animation-delay:.5s;"></div>
            </div>
            <div class="mbot-mouth" style="width:15px;height:6px;"></div>
          </div>

          <div class="mbot mb8">
            <div class="mbot-antenna" style="height:9px;"></div>
            <div class="mbot-visor" style="width:31px;height:21px;gap:4px;">
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:1.6s;"></div>
              <div class="mbot-eye" style="width:6px;height:6px;animation-delay:.9s;"></div>
            </div>
            <div class="mbot-mouth" style="width:13px;height:5px;"></div>
          </div>

        </div>

        <!-- MAIN ROBOT -->
        <div class="robot-stage">
          <div class="halo"></div>

          <div class="robot-bubble">Hi there! Ready to learn?</div>

          <div class="main-robot">
            <div class="mr-antenna"></div>
            <div class="mr-head">
              <div class="mr-phones"></div>
              <div class="mr-visor">
                <div class="mr-eye"></div>
                <div class="mr-eye"></div>
              </div>
              <div class="mr-smile"></div>
            </div>
            <div class="mr-neck"></div>
            <div class="body-arms">
              <div class="mr-arm left"></div>
              <div class="mr-body">
                <div class="mr-chest">🤖</div>
                <div class="mr-badge"></div>
              </div>
              <div class="mr-arm right">
                <div class="mr-wand"></div>
              </div>
            </div>
            <div class="mr-legs">
              <div class="mr-leg"></div>
              <div class="mr-leg"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <div class="bottom-bar"></div>

  <script>
    /* ── Particle canvas ── */
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const colors = ['rgba(255,214,0,', 'rgba(41,121,255,', 'rgba(0,229,255,', 'rgba(255,255,255,'];

      for (let i = 0; i < 65; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 2.4 + 0.4,
          dx: (Math.random() - 0.5) * 0.3,
          dy: (Math.random() - 0.5) * 0.3,
          color: colors[Math.floor(Math.random() * colors.length)],
          alpha: Math.random() * 0.6 + 0.1,
          pulse: Math.random() * Math.PI * 2
        });
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        const now = Date.now() / 1000;

        particles.forEach(p => {
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
          p.pulse += 0.025;
          const a = p.alpha * (0.5 + 0.5 * Math.sin(p.pulse));
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color + a + ')';
          ctx.fill();
          /* subtle glow for big particles */
          if (p.r > 1.5) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * 2.8, 0, Math.PI * 2);
            ctx.fillStyle = p.color + (a * 0.18) + ')';
            ctx.fill();
          }
        });

        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── Page transition ── */
    document.getElementById('enterBtn').addEventListener('click', function (e) {
      e.preventDefault();
      const overlay = document.getElementById('pageTransition');
      overlay.classList.add('active');
      const href = this.href;
      setTimeout(() => { window.location.href = href; }, 450);
    });
  </script>
</body>

</html>
